<a class="skip-link button" href="#main-content">Skip to content</a>
<header role="banner" class="site-head">
  <div class="wrap">
    <div class="site-head__inner">
      <a href="/" aria-label="Jackie Raw Health - home" class="site-head__brand">
        <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" style="fill-rule: evenodd; clip-rule: evenodd; stroke-linecap: round; stroke-linejoin: round" viewBox="0 0 1000 1000">
          <circle cx="500" cy="500" r="479.273" style="fill: #e55937" />
          <circle cx="12" cy="5" r="1" style="fill: none; stroke: #fff; stroke-width: 2px" transform="matrix(33.88639 0 0 31.81933 93.363 118.168)" />
          <path d="m9 20 3-6 3 6M6 8l6 2 6-2M12 10v4" style="fill: none; fill-rule: nonzero; stroke: #fff; stroke-width: 2px" transform="matrix(33.88639 0 0 31.81933 93.363 118.168)" />
        </svg>
        <span>Jackie Raw<br />Health</span>
      </a>

      <div class="site-head__navigational">
        <button class="nav-burger" type="button" aria-expanded="false" aria-label="Menu" aria-controls="menu">
          <i></i>
          <span class="visually-hidden">menu</span>
        </button>

        <nav class="nav site-head__nav" aria-expanded="false" aria-label="Main navigation">
          <ul id="menu" class="nav__list" role="list">
            {{ $currentPage := . }} {{ $currentPageTitle := lower .Title }} {{ range .Site.Menus.main }}
            <li>
              <a title="{{ .Name }}" {{- if eq $currentPageTitle (lower .Name) }} aria-current="page" data-state="active" {{- end }} href="{{ .URL }}"> {{ .Name }} </a>
            </li>
            {{ end }}
          </ul>
        </nav>
      </div>
    </div>
  </div>
</header>
